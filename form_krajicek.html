<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulář - Krajíček</title>
    <style>
        body {
            background-color: #e6e6e6;
            font-family: Arial, Helvetica, sans-serif;
            color: black;
            
        }
        .container {
            border: 1px black solid;
            max-width: 600px;
            margin: 50px auto;
            padding: 10px;
            box-shadow: rgba(0, 0, 0, 0.25) 0px 54px 55px, rgba(0, 0, 0, 0.12) 0px -12px 30px, rgba(0, 0, 0, 0.12) 0px 4px 6px, rgba(0, 0, 0, 0.17) 0px 12px 13px, rgba(0, 0, 0, 0.09) 0px -3px 5px;
            border-radius: 5px;
        
        }

        .block {
            margin: 20px 20px 25px;
            border: 1px red dotted;
            padding: 10px 10px 15px;
            background-color: aquamarine;

        }

        .block .item {
            margin-bottom: 5px;

        }

        .w-100 {
            width: 100%;
        }

        .m-t-1 {
            margin-top: 10px;

        }

        .p-1 {
            padding: 10px;
        }

        .p-2 {
            padding: 20px; 
        }

    </style>
</head>
<body>
    <div class="container">
        <form action="/action_page.php">
            <div class="block">
                <div><label for="fname">Křestní jméno:</label><br></div>
                <div><input class="p-1" type="text" id="fname" name="fname" value="Jan"><br></div>
                <div><label for="lname">Příjmení:</label><br></div>
                <div></div><input class="p-1" type="text" id="lname" name="lname"><br><br></form</div>
            </div>
            <div class="block">
                <div><input type="checkbox" id="vehicle1" name="vehicle1">
                </div><label for="vehicle1"> I have a bike</label><br></form</div>
                <div></div><input type="checkbox" id="vehicle2" name="vehicle2" value="Car"></form</div>
                <div></div><label for="vehicle2"> I have a car</label><br></form</div>
                <div></div><input type="checkbox" id="vehicle3" name="vehicle3" value="Boat"></form</div>
                <div></div><label for="vehicle3"> I have a boat</label></form</div>
            </div>
            <div class="block">
                <div></div><input type="radio" id="html" name="fav_language" value="HTML"></form</div>
                <div></div><label for="html">HTML</label><br></form</div>
                           <div></div> <input type="radio" id="css" name="fav_language" value="CSS"></form</div>
                <div></div><label for="css">CSS</label><br></form</div>
                <div></div><input type="radio" id="javascript" name="fav_language" value="JavaScript"></form</div>
                <div></div><label for="javascript">JavaScript</label>
            </div>
           <div class="block">
               <div></div> <label for="vol">Volume (between 0 and 50):</label></form</div>
                <div></div><input class="w-100 m-t-1" type="range" id="vol" name="vol" min="0" max="50"></form</div>
                <hr>
           </div>
           <div></div><input type="submit" value="Odeslat"></form</div>
            
          </form> 
    </div>

</body>
</html>
