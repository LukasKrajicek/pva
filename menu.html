<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ukázka tvorby menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        
        #navbar {
            background-color: aquamarine;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #navbar .logo {
            margin: 0 12px;
        }

        #navbar ul {
            display: flex;
            list-style: none;

        }

        #navbar ul li {
            margin: 0 12px;
            padding: 0 4px;
        }

        #navbar ul li a {
            margin: 0 4px;
            padding: 2 12px;
            text-decoration: none;
            border-radius: 5px;
            color: black;
            text-transform: uppercase;
        }

        #navbar ul li a:hover {
            background-color: aqua;
            color: blueviolet;

        }
    </style>
</head>
<body>
    
    <nav id="navbar">
        <div class="logo"> <i class="fa-solid fa-bars"></i> PF Plasty</div>
        <ul>
            <li><a href="#home"> <i class="fa-solid fa-house"></i> home</a></li>
            <li><a href="#form"> <i class="fa-regular fa-clipboard"></i> form</a></li>
            <li><a href="#contact"> <i class="fa-solid fa-envelope"></i> contact</a></li>
        </ul>



    </nav>
</body>
</html>
